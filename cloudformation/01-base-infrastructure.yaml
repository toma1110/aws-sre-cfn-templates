AWSTemplateFormatVersion: '2010-09-09'
Description: Section 2 Hands-on - Base infrastructure (VPC / ALB / EC2 / RDS)

Parameters:
  DBPassword:
    Type: String
    NoEcho: true
    MinLength: 8
    Description: RDS Master password (8+ characters)

  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: EC2 key pair name

  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues: [t3.micro, t3.small, t3.medium]
    Description: EC2 instance type

Mappings:
  RegionMap:
    ap-northeast-1:
      AMI: ami-0f18986364089c4ab  # Amazon Linux 2023 (東京)

Resources:
  # ── VPC ──────────────────────────────────────────────────
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: sre-handson-vpc

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: sre-handson-igw

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  # ── サブネット ─────────────────────────────────────────────
  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: sre-handson-public-1a

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: sre-handson-public-1c

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.11.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: sre-handson-private-1a

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.12.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags:
        - Key: Name
          Value: sre-handson-private-1c

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: sre-handson-public-rt

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  # ── セキュリティグループ ───────────────────────────────────
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ALB Security Group
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: sre-handson-alb-sg

  AppSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: App EC2 Security Group
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          SourceSecurityGroupId: !Ref ALBSecurityGroup
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: sre-handson-app-sg

  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: RDS Security Group
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          SourceSecurityGroupId: !Ref AppSecurityGroup
      Tags:
        - Key: Name
          Value: sre-handson-rds-sg

  # ── IAM（CloudWatch Agent用） ─────────────────────────────
  AppInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: sre-handson-app-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/AWSXRayDaemonWriteAccess
        - arn:aws:iam::aws:policy/AWSXRayReadOnlyAccess

  AppInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: sre-handson-app-profile
      Roles:
        - !Ref AppInstanceRole

  # ── CloudWatch Logs ロググループ ──────────────────────────
  WebAppLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/ec2/sre-handson/webapp
      RetentionInDays: 7

  # ── EC2 ──────────────────────────────────────────────────
  AppInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !FindInMap [RegionMap, !Ref AWS::Region, AMI]
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      SubnetId: !Ref PublicSubnet1
      SecurityGroupIds:
        - !Ref AppSecurityGroup
      IamInstanceProfile: !Ref AppInstanceProfile
      Tags:
        - Key: Name
          Value: sre-handson-app
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -e
          
          # パッケージインストール
          dnf update -y
          dnf install -y python3-pip amazon-cloudwatch-agent

          # アプリケーション作成
          mkdir -p /home/ec2-user/app
          cat > /home/ec2-user/app/app.py << 'EOFAPP'
          from flask import Flask, jsonify, request
          import json
          import logging
          import random
          import sys
          import time
          from datetime import datetime
          from aws_xray_sdk.core import xray_recorder
          from aws_xray_sdk.ext.flask.middleware import XRayMiddleware

          app = Flask(__name__)

          # X-Ray設定
          xray_recorder.configure(service='SRE-Handson-App')
          XRayMiddleware(app, xray_recorder)

          # JSON形式のログ設定
          class JsonFormatter(logging.Formatter):
              def format(self, record):
                  log_data = {
                      'timestamp': datetime.utcnow().isoformat() + 'Z',
                      'level': record.levelname,
                      'message': record.getMessage(),
                      'logger': record.name,
                      'requestId': getattr(record, 'requestId', 'N/A'),
                      'remote_addr': getattr(record, 'remote_addr', 'N/A'),
                      'method': getattr(record, 'method', 'N/A'),
                      'path': getattr(record, 'path', 'N/A'),
                      'status': getattr(record, 'status', 'N/A'),
                      'duration': getattr(record, 'duration', 'N/A')
                  }
                  if record.exc_info:
                      log_data['exception'] = self.formatException(record.exc_info)
                  return json.dumps(log_data)

          handler = logging.StreamHandler(sys.stdout)
          handler.setFormatter(JsonFormatter())
          app.logger.addHandler(handler)
          app.logger.setLevel(logging.INFO)

          request_counter = 0

          def log_request(request_id, status_code, duration_ms):
              """リクエストログを記録"""
              extra = {
                  'requestId': request_id,
                  'remote_addr': request.remote_addr,
                  'method': request.method,
                  'path': request.path,
                  'status': status_code,
                  'duration': duration_ms
              }
              if status_code >= 500:
                  app.logger.error(f"Request failed with status {status_code}", extra=extra)
              elif status_code >= 400:
                  app.logger.warning(f"Client error {status_code}", extra=extra)
              else:
                  app.logger.info(f"Request completed successfully", extra=extra)

          @app.route('/')
          def index():
              global request_counter
              request_counter += 1
              request_id = f"req-{request_counter:06d}"
              start_time = time.time()
              
              # ランダムな処理時間（10-50ms）
              time.sleep(random.uniform(0.01, 0.05))
              
              duration_ms = round((time.time() - start_time) * 1000, 2)
              log_request(request_id, 200, duration_ms)
              return jsonify({'status': 'ok', 'service': 'SRE Handson App', 'requestId': request_id})

          @app.route('/api/data')
          def get_data():
              global request_counter
              request_counter += 1
              request_id = f"req-{request_counter:06d}"
              start_time = time.time()
              
              # ランダムな処理時間（50-200ms）
              time.sleep(random.uniform(0.05, 0.2))
              
              # 20%の確率でエラーを発生させる
              if random.random() < 0.2:
                  duration_ms = round((time.time() - start_time) * 1000, 2)
                  log_request(request_id, 500, duration_ms)
                  return jsonify({'error': 'Internal server error', 'requestId': request_id}), 500
              
              duration_ms = round((time.time() - start_time) * 1000, 2)
              log_request(request_id, 200, duration_ms)
              return jsonify({'data': [1, 2, 3], 'requestId': request_id}), 200

          @app.route('/api/process')
          def process():
              global request_counter
              request_counter += 1
              request_id = f"req-{request_counter:06d}"
              start_time = time.time()
              
              # ランダムな処理時間（100-500ms、たまに遅い）
              if random.random() < 0.1:
                  time.sleep(random.uniform(0.5, 1.0))  # 10%の確率で遅い
              else:
                  time.sleep(random.uniform(0.1, 0.5))
              
              # 15%の確率でエラーを発生させる
              if random.random() < 0.15:
                  duration_ms = round((time.time() - start_time) * 1000, 2)
                  log_request(request_id, 500, duration_ms)
                  return jsonify({'error': 'Processing error', 'requestId': request_id}), 500
              
              duration_ms = round((time.time() - start_time) * 1000, 2)
              log_request(request_id, 200, duration_ms)
              return jsonify({'result': 'success', 'requestId': request_id}), 200

          if __name__ == '__main__':
              app.logger.info("Application starting", extra={'requestId': 'startup', 'remote_addr': 'N/A', 'method': 'N/A', 'path': 'N/A', 'status': 'N/A', 'duration': 'N/A'})
              app.run(host='0.0.0.0', port=8080)
          EOFAPP

          # requirements.txt作成
          cat > /home/ec2-user/app/requirements.txt << 'EOFREQ'
          Flask==3.0.0
          aws-xray-sdk==2.12.0
          EOFREQ

          # 依存関係インストール
          pip3 install -r /home/ec2-user/app/requirements.txt

          chown -R ec2-user:ec2-user /home/ec2-user/app

          # systemdサービスとして登録
          cat > /etc/systemd/system/todo-app.service << 'EOFSERVICE'
          [Unit]
          Description=SRE Handson App
          After=network.target

          [Service]
          Type=simple
          User=ec2-user
          WorkingDirectory=/home/ec2-user/app
          ExecStart=/usr/bin/python3 app.py
          Restart=always
          StandardOutput=append:/var/log/todo-app.log
          StandardError=append:/var/log/todo-app.log

          [Install]
          WantedBy=multi-user.target
          EOFSERVICE

          systemctl daemon-reload
          systemctl enable todo-app
          systemctl start todo-app

          # CloudWatch Agent設定
          mkdir -p /opt/aws/amazon-cloudwatch-agent/etc
          cat > /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json << 'EOFCW'
          {
            "traces": {
              "traces_collected": {
                "xray": {}
              }
            },
            "logs": {
              "logs_collected": {
                "files": {
                  "collect_list": [
                    {
                      "file_path": "/var/log/todo-app.log",
                      "log_group_name": "/aws/ec2/sre-handson/webapp",
                      "log_stream_name": "{instance_id}"
                    }
                  ]
                }
              }
            },
            "metrics": {
              "namespace": "CWAgent",
              "metrics_collected": {
                "mem": {
                  "measurement": ["mem_used_percent"],
                  "metrics_collection_interval": 60
                },
                "disk": {
                  "measurement": ["disk_used_percent"],
                  "resources": ["/"],
                  "metrics_collection_interval": 60
                }
              },
              "append_dimensions": {
                "InstanceId": "${!aws:InstanceId}"
              }
            }
          }
          EOFCW

          /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl \
            -a fetch-config \
            -m ec2 \
            -s \
            -c file:/opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json

  # ── ALB ──────────────────────────────────────────────────
  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: sre-handson-alb
      Type: application
      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      SecurityGroups:
        - !Ref ALBSecurityGroup

  ALBTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: sre-handson-tg
      VpcId: !Ref VPC
      Protocol: HTTP
      Port: 8080
      TargetType: instance
      Targets:
        - Id: !Ref AppInstance
      HealthCheckPath: /
      HealthCheckIntervalSeconds: 30

  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Protocol: HTTP
      Port: 80
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref ALBTargetGroup

  # ── RDS ──────────────────────────────────────────────────
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: SRE Handson DB Subnet Group
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2

  RDSInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Delete
    Properties:
      DBInstanceIdentifier: sre-handson-db
      DBInstanceClass: db.t3.micro
      Engine: mysql
      EngineVersion: '8.0'
      DBName: sreapp
      MasterUsername: admin
      MasterUserPassword: !Ref DBPassword
      AllocatedStorage: 20
      StorageType: gp2
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !Ref RDSSecurityGroup
      BackupRetentionPeriod: 0
      MultiAZ: false
      PubliclyAccessible: false
      EnableCloudwatchLogsExports:
        - error
        - slowquery

Outputs:
  ALBEndpoint:
    Description: ALB Endpoint URL
    Value: !Sub http://${ALB.DNSName}

  AppInstanceId:
    Description: EC2 Instance ID
    Value: !Ref AppInstance

  RDSEndpoint:
    Description: RDS Endpoint
    Value: !GetAtt RDSInstance.Endpoint.Address

  DBName:
    Description: RDS Database Name
    Value: sreapp

  DBUser:
    Description: RDS Master Username
    Value: admin
