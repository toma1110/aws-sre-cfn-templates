AWSTemplateFormatVersion: '2010-09-09'
Description: Section 9 Hands-on - Cost Alerts (AWS Budgets + Cost Anomaly Detection) - Deploy to us-east-1

Parameters:
  NotificationEmail:
    Type: String
    Description: Cost alert notification email address

  MonthlyBudgetAmount:
    Type: Number
    Default: 3000
    Description: Monthly budget limit (JPY)

  AnomalyThresholdAmount:
    Type: Number
    Default: 500
    Description: Anomaly detection threshold (JPY). Notify when exceeded

Resources:
  # ── SNS トピック（コスト通知用） ─────────────────────────
  CostAlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: sre-handson-cost-alerts
      DisplayName: SRE Handson Cost Alerts

  CostEmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref CostAlertTopic
      Protocol: email
      Endpoint: !Ref NotificationEmail

  # SNSトピックにBudgetsからの発行を許可
  CostAlertTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref CostAlertTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - budgets.amazonaws.com
                - costalerts.amazonaws.com
            Action: sns:Publish
            Resource: !Ref CostAlertTopic

  # ── AWS Budgets ───────────────────────────────────────────
  MonthlyBudget:
    Type: AWS::Budgets::Budget
    Properties:
      Budget:
        BudgetName: sre-handson-monthly-budget
        BudgetType: COST
        TimeUnit: MONTHLY
        BudgetLimit:
          Amount: !Ref MonthlyBudgetAmount
          Unit: JPY
      NotificationsWithSubscribers:
        - Notification:
            NotificationType: ACTUAL
            ComparisonOperator: GREATER_THAN
            Threshold: 80
            ThresholdType: PERCENTAGE
          Subscribers:
            - SubscriptionType: SNS
              Address: !Ref CostAlertTopic
        - Notification:
            NotificationType: ACTUAL
            ComparisonOperator: GREATER_THAN
            Threshold: 100
            ThresholdType: PERCENTAGE
          Subscribers:
            - SubscriptionType: SNS
              Address: !Ref CostAlertTopic
        - Notification:
            NotificationType: FORECASTED
            ComparisonOperator: GREATER_THAN
            Threshold: 100
            ThresholdType: PERCENTAGE
          Subscribers:
            - SubscriptionType: SNS
              Address: !Ref CostAlertTopic

  # ── Cost Anomaly Detection ────────────────────────────────
  CostAnomalyMonitor:
    Type: AWS::CE::AnomalyMonitor
    Properties:
      MonitorName: sre-handson-anomaly-monitor
      MonitorType: DIMENSIONAL
      MonitorDimension: SERVICE

  CostAnomalySubscription:
    Type: AWS::CE::AnomalySubscription
    Properties:
      SubscriptionName: sre-handson-anomaly-subscription
      MonitorArnList:
        - !GetAtt CostAnomalyMonitor.MonitorArn
      Subscribers:
        - Address: !Ref CostAlertTopic
          Type: SNS
      ThresholdExpression:
        Dimensions:
          Key: ANOMALY_TOTAL_IMPACT_ABSOLUTE
          MatchOptions:
            - GREATER_THAN_OR_EQUAL
          Values:
            - !Sub '${AnomalyThresholdAmount}'
      Frequency: DAILY

Outputs:
  SNSTopicArn:
    Description: Cost alert SNS Topic ARN
    Value: !Ref CostAlertTopic

  BudgetName:
    Description: Budget name
    Value: sre-handson-monthly-budget

  CostExplorerURL:
    Description: Cost Explorer URL
    Value: https://console.aws.amazon.com/cost-management/home#/cost-explorer

  AnomalyDetectionURL:
    Description: Cost Anomaly Detection URL
    Value: https://console.aws.amazon.com/cost-management/home#/anomaly-detection/monitors
