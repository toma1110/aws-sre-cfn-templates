AWSTemplateFormatVersion: '2010-09-09'
Description: Section 3 Hands-on - Custom Metrics (Lambda to CloudWatch)

Resources:
  # ── Lambda実行ロール ──────────────────────────────────────
  MetricSenderRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: sre-handson-metric-sender-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: PutMetricData
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: cloudwatch:PutMetricData
                Resource: '*'

  # ── Lambda（カスタムメトリクスを送信） ────────────────────
  MetricSenderFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: sre-handson-metric-sender
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt MetricSenderRole.Arn
      Timeout: 30
      Description: Sample Lambda to send business KPIs as custom metrics to CloudWatch
      Code:
        ZipFile: |
          import boto3
          import random
          import datetime

          cw = boto3.client('cloudwatch')

          def handler(event, context):
              now = datetime.datetime.utcnow()

              # アクティブユーザー数（シミュレート）
              active_users = random.randint(50, 200)

              # 注文数（シミュレート）
              order_count = random.randint(0, 30)

              # エラー数（シミュレート）
              error_count = random.randint(0, 5)

              metrics = [
                  {
                      'MetricName': 'ActiveUsers',
                      'Value': active_users,
                      'Unit': 'Count',
                      'Dimensions': [{'Name': 'Environment', 'Value': 'handson'}]
                  },
                  {
                      'MetricName': 'OrderCount',
                      'Value': order_count,
                      'Unit': 'Count',
                      'Dimensions': [{'Name': 'Environment', 'Value': 'handson'}]
                  },
                  {
                      'MetricName': 'AppErrorCount',
                      'Value': error_count,
                      'Unit': 'Count',
                      'Dimensions': [{'Name': 'Environment', 'Value': 'handson'}]
                  }
              ]

              cw.put_metric_data(
                  Namespace='SREHandson/Business',
                  MetricData=metrics
              )

              print(f"Sent metrics: ActiveUsers={active_users}, Orders={order_count}, Errors={error_count}")
              return {'statusCode': 200, 'body': 'OK'}

  # ── EventBridge（1分ごとに実行） ──────────────────────────
  MetricSenderSchedule:
    Type: AWS::Events::Rule
    Properties:
      Name: sre-handson-metric-sender-schedule
      Description: EventBridge rule to trigger Lambda every minute
      ScheduleExpression: rate(1 minute)
      State: ENABLED
      Targets:
        - Arn: !GetAtt MetricSenderFunction.Arn
          Id: MetricSenderTarget

  MetricSenderPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref MetricSenderFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt MetricSenderSchedule.Arn

Outputs:
  FunctionName:
    Description: Lambda function name
    Value: !Ref MetricSenderFunction

  MetricNamespace:
    Description: Custom metrics namespace
    Value: SREHandson/Business

  CloudWatchURL:
    Description: CloudWatch custom metrics URL
    Value: !Sub https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home#metricsV2:graph=~();namespace=SREHandson/Business
