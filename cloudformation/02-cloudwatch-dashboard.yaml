AWSTemplateFormatVersion: '2010-09-09'
Description: Section 3 Hands-on - CloudWatch Dashboard (EC2 / ALB / RDS)

Parameters:
  InstanceId:
    Type: String
    Description: EC2 Instance ID created by 01-base-infrastructure

  ALBFullName:
    Type: String
    Description: ALB full name from 01-base-infrastructure Outputs (app/name/hash format)

  DBIdentifier:
    Type: String
    Default: sre-handson-db
    Description: RDS DB Identifier

Resources:
  SREDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: SRE-Handson-Dashboard
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "text",
              "x": 0, "y": 0, "width": 24, "height": 1,
              "properties": {
                "markdown": "# SRE Hands-on Dashboard\nReview key EC2, ALB, and RDS metrics in one place."
              }
            },
            {
              "type": "metric",
              "x": 0, "y": 1, "width": 8, "height": 6,
              "properties": {
                "title": "EC2 CPU Utilization",
                "region": "${AWS::Region}",
                "metrics": [
                  ["AWS/EC2", "CPUUtilization", "InstanceId", "${InstanceId}"]
                ],
                "period": 60,
                "stat": "Average",
                "view": "timeSeries",
                "annotations": {
                  "horizontal": [{"value": 80, "label": "Warning line", "color": "#ff7f0e"}]
                }
              }
            },
            {
              "type": "metric",
              "x": 8, "y": 1, "width": 8, "height": 6,
              "properties": {
                "title": "EC2 Memory Utilization (CloudWatch Agent)",
                "region": "${AWS::Region}",
                "metrics": [
                  ["CWAgent", "mem_used_percent", "InstanceId", "${InstanceId}"]
                ],
                "period": 60,
                "stat": "Average",
                "view": "timeSeries",
                "annotations": {
                  "horizontal": [{"value": 85, "label": "Warning line", "color": "#ff7f0e"}]
                }
              }
            },
            {
              "type": "metric",
              "x": 16, "y": 1, "width": 8, "height": 6,
              "properties": {
                "title": "EC2 Disk Utilization (CloudWatch Agent)",
                "region": "${AWS::Region}",
                "metrics": [
                  ["CWAgent", "disk_used_percent", "InstanceId", "${InstanceId}", "path", "/", "device", "nvme0n1p1", "fstype", "xfs"]
                ],
                "period": 60,
                "stat": "Average",
                "view": "timeSeries"
              }
            },
            {
              "type": "metric",
              "x": 0, "y": 7, "width": 8, "height": 6,
              "properties": {
                "title": "ALB Request Count",
                "region": "${AWS::Region}",
                "metrics": [
                  ["AWS/ApplicationELB", "RequestCount", "LoadBalancer", "${ALBFullName}"]
                ],
                "period": 60,
                "stat": "Sum",
                "view": "timeSeries"
              }
            },
            {
              "type": "metric",
              "x": 8, "y": 7, "width": 8, "height": 6,
              "properties": {
                "title": "ALB 5xx Error Rate",
                "region": "${AWS::Region}",
                "metrics": [
                  [ { "expression": "(m1/m2)*100", "label": "5xx error rate (%)", "id": "e1" } ],
                  [ "AWS/ApplicationELB", "HTTPCode_Target_5XX_Count", "LoadBalancer", "${ALBFullName}", { "id": "m1", "visible": false } ],
                  [ "AWS/ApplicationELB", "RequestCount", "LoadBalancer", "${ALBFullName}", { "id": "m2", "visible": false } ]
                ],
                "period": 60,
                "stat": "Sum",
                "view": "timeSeries",
                "yAxis": {
                  "left": {
                    "min": 0,
                    "max": 100
                  }
                }
              }
            },
            {
              "type": "metric",
              "x": 16, "y": 7, "width": 8, "height": 6,
              "properties": {
                "title": "ALB Response Time (p99)",
                "region": "${AWS::Region}",
                "metrics": [
                  ["AWS/ApplicationELB", "TargetResponseTime", "LoadBalancer", "${ALBFullName}"]
                ],
                "period": 60,
                "stat": "p99",
                "view": "timeSeries",
                "annotations": {
                  "horizontal": [{"value": 1, "label": "SLO: within 1 second", "color": "#d62728"}]
                }
              }
            },
            {
              "type": "metric",
              "x": 0, "y": 13, "width": 8, "height": 6,
              "properties": {
                "title": "RDS CPU Utilization",
                "region": "${AWS::Region}",
                "metrics": [
                  ["AWS/RDS", "CPUUtilization", "DBInstanceIdentifier", "${DBIdentifier}"]
                ],
                "period": 60,
                "stat": "Average",
                "view": "timeSeries"
              }
            },
            {
              "type": "metric",
              "x": 8, "y": 13, "width": 8, "height": 6,
              "properties": {
                "title": "RDS Database Connections",
                "region": "${AWS::Region}",
                "metrics": [
                  ["AWS/RDS", "DatabaseConnections", "DBInstanceIdentifier", "${DBIdentifier}"]
                ],
                "period": 60,
                "stat": "Average",
                "view": "timeSeries"
              }
            },
            {
              "type": "metric",
              "x": 16, "y": 13, "width": 8, "height": 6,
              "properties": {
                "title": "RDS Free Storage",
                "region": "${AWS::Region}",
                "metrics": [
                  ["AWS/RDS", "FreeStorageSpace", "DBInstanceIdentifier", "${DBIdentifier}"]
                ],
                "period": 60,
                "stat": "Average",
                "view": "timeSeries"
              }
            }
          ]
        }

Outputs:
  DashboardURL:
    Description: CloudWatch Dashboard URL
    Value: !Sub https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home#dashboards:name=SRE-Handson-Dashboard
