AWSTemplateFormatVersion: '2010-09-09'
Description: Section 4 Hands-on - CloudWatch Logs Metric Filter (JSON log format)

Parameters:
  LogGroupName:
    Type: String
    Default: /aws/ec2/sre-handson/webapp
    Description: Target CloudWatch Logs group name

Resources:
  # ── メトリクスフィルター: ERRORログ ──────────────────────
  # JSON形式のログから level = "ERROR" を検出
  # ログ例: {"timestamp": "2024-05-04T08:30:01.456Z", "level": "ERROR", "message": "Database connection failed", "logger": "app", "requestId": "req-000002"}
  ErrorLogMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref LogGroupName
      FilterName: sre-handson-error-filter
      FilterPattern: '{ $.level = "ERROR" }'
      MetricTransformations:
        - MetricNamespace: SREHandson/App
          MetricName: ErrorCount
          MetricValue: '1'
          DefaultValue: 0
          Unit: Count

  # ── メトリクスフィルター: 5xxエラー ────────────────────
  # 注意: このフィルターはログに status フィールドがある場合に機能します
  # 現在のアプリケーションではログにstatusを出力していないため、
  # ERRORレベルのログをカウントすることで代替しています
  SlowResponseMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref LogGroupName
      FilterName: sre-handson-5xx-filter
      FilterPattern: '{ $.status = "500" }'
      MetricTransformations:
        - MetricNamespace: SREHandson/App
          MetricName: HTTP5xxCount
          MetricValue: '1'
          DefaultValue: 0
          Unit: Count

Outputs:
  LogGroupName:
    Description: Target log group
    Value: !Ref LogGroupName

  MetricNamespace:
    Description: Metrics namespace
    Value: SREHandson/App

  LogsInsightsURL:
    Description: Logs Insights query URL
    Value: !Sub |
      https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home#logsV2:logs-insights

      ── 使えるクエリ例 ──
      # ERRORログを探す
      fields @timestamp, message, requestId, path, status, duration
      | filter level = "ERROR"
      | sort @timestamp desc
      | limit 50

      # ステータスコード別の集計
      filter status != "N/A"
      | stats count() by status
      | sort count desc

      # レスポンスタイムの統計
      filter duration != "N/A"
      | stats avg(duration) as avg_ms, max(duration) as max_ms, pct(duration, 99) as p99_ms by bin(5m)
